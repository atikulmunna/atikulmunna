```svg
<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      fill: #ffffff;
      letter-spacing: 0.04em;
    }

    .sub {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      fill: #a3a3a3;
      letter-spacing: 0.08em;
    }

    .arc {
      stroke: #ffffff;
      stroke-width: 1.4;
      stroke-dasharray: 4 8;
      opacity: 0.8;
    }

    .horizon {
      stroke: #555555;
      stroke-width: 1;
      stroke-dasharray: 2 7;
      opacity: 0.7;
    }

    .orbit-icon {
      offset-path: path("M 90 125 C 250 20, 650 20, 810 125");
      animation: travel 7s ease-in-out infinite;
    }

    .sun {
      animation: sunFade 7s ease-in-out infinite;
    }

    .moon {
      animation: moonFade 7s ease-in-out infinite;
    }

    .ray {
      stroke: #ffffff;
      stroke-width: 1.5;
      stroke-linecap: round;
      animation: rayFade 7s ease-in-out infinite;
    }

    .stars {
      animation: starsFade 7s ease-in-out infinite;
    }

    @keyframes travel {
      0% {
        offset-distance: 0%;
      }
      50% {
        offset-distance: 50%;
      }
      100% {
        offset-distance: 100%;
      }
    }

    @keyframes sunFade {
      0%, 48% {
        opacity: 1;
        transform: scale(1);
      }
      55%, 100% {
        opacity: 0;
        transform: scale(0.7);
      }
    }

    @keyframes moonFade {
      0%, 45% {
        opacity: 0;
        transform: scale(0.7);
      }
      58%, 100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rayFade {
      0%, 45% {
        opacity: 0.9;
      }
      55%, 100% {
        opacity: 0;
      }
    }

    @keyframes starsFade {
      0%, 45% {
        opacity: 0;
      }
      60%, 100% {
        opacity: 1;
      }
    }
  </style>

  <rect width="900" height="180" fill="#000000"/>

  <!-- dotted arc -->
  <path class="arc" d="M 90 125 C 250 20, 650 20, 810 125"/>

  <!-- horizon -->
  <path class="horizon" d="M 65 128 H 835"/>

  <!-- stars appearing at night -->
  <g class="stars" opacity="0">
    <circle cx="620" cy="42" r="1.3" fill="#ffffff"/>
    <circle cx="690" cy="68" r="1" fill="#ffffff"/>
    <circle cx="750" cy="39" r="1.2" fill="#ffffff"/>
    <circle cx="575" cy="82" r="0.9" fill="#ffffff"/>
    <circle cx="805" cy="88" r="1" fill="#ffffff"/>
  </g>

  <!-- moving sun/moon icon -->
  <g class="orbit-icon">
    <!-- sun -->
    <g class="sun" transform-origin="0 0">
      <circle cx="0" cy="0" r="13" stroke="#ffffff" stroke-width="2"/>
      <line class="ray" x1="0" y1="-25" x2="0" y2="-18"/>
      <line class="ray" x1="0" y1="18" x2="0" y2="25"/>
      <line class="ray" x1="-25" y1="0" x2="-18" y2="0"/>
      <line class="ray" x1="18" y1="0" x2="25" y2="0"/>
      <line class="ray" x1="-18" y1="-18" x2="-13" y2="-13"/>
      <line class="ray" x1="18" y1="-18" x2="13" y2="-13"/>
      <line class="ray" x1="-18" y1="18" x2="-13" y2="13"/>
      <line class="ray" x1="18" y1="18" x2="13" y2="13"/>
    </g>

    <!-- moon -->
    <g class="moon" opacity="0" transform-origin="0 0">
      <path d="M 13 -13 C 3 -10, -4 -1, -3 9 C -1 22, 12 28, 24 22 C 15 21, 7 14, 6 4 C 5 -4, 8 -10, 13 -13 Z"
            stroke="#ffffff"
            stroke-width="2"
            fill="none"
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- endpoint labels -->
  <text x="90" y="155" text-anchor="middle" class="sub">SUNRISE</text>
  <text x="450" y="155" text-anchor="middle" class="label">code from sunrise to all night</text>
  <text x="810" y="155" text-anchor="middle" class="sub">NIGHT</text>
</svg>
```
