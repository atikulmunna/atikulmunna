name: Update Space Shooter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gh-space-shooter
        run: pip install gh-space-shooter --break-system-packages

      - name: Patch theme + hexagon cells + lavender starfield
        run: echo "" | base64 -d | python3

      - name: Generate game GIF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh-space-shooter ${{ github.repository_owner }} \
            --output game.gif \
            --strategy random \
            --fps 40

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add game.gif
          git diff --staged --quiet || git commit -m "Update space shooter game GIF"
          git pull --rebase origin main
          git push origin main
