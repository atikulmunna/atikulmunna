name: Update Space Shooter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gh-space-shooter
        run: pip install gh-space-shooter

      - name: Patch to black and white theme
        run: echo "" | base64 -d | python3

      - name: Generate game GIF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh-space-shooter ${{ github.repository_owner }} \
            --output game.gif \
            --strategy random \
            --fps 40

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add game.gif
          COMMIT_MSG="Update space shooter game GIF"
          LAST_MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "")
          LAST_FILES=$(git log -1 --name-only --pretty=format: 2>/dev/null | grep -v '^$' || echo "")
          if [ "$LAST_MSG" = "$COMMIT_MSG" ] && [ "$LAST_FILES" = "game.gif" ]; then
            git commit --amend --no-edit
            git push --force-with-lease
          else
            git diff --staged --quiet || git commit -m "$COMMIT_MSG"
            git push
          fi
